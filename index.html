<style>

:root{
--pokedex-red:#cc0000;
--pokedex-dark:#8b0000;

/* Type Kleuren */
--type-normal:#A8A77A;
--type-grass:#7AC74C;
--type-fire:#EE8130;
--type-water:#6390F0;
--type-ice:#96D9D6;
--type-fighting:#C22E28;
--type-poison:#A33EA1;
--type-ground:#E2BF65;
--type-flying:#A98FF3;
--type-psychic:#F95587;
--type-rock:#B6A136;
--type-ghost:#735797;
--type-dark:#705746;
--type-steel:#B7B7CE;
--type-fairy:#D685AD;
/* Plant specifieke types */
--type-wood:#795548;
--type-bloom:#e91e63;
--type-berry:#ff9800;

/* Rarity Kleuren */
--common-gray: #95a5a6;
--rare-blue: #3498db;
--legendary-gold: #f1c40f;
--mythical-purple: #9b59b6;
}

body{
margin:0;
background:#2b2b2b;
font-family:Roboto;
}

.page{
width:148mm;
min-height:210mm;
margin:20px auto;
background:#f5f5f5;
padding:20px;
border:12px solid var(--pokedex-red);
border-radius:0 25px 25px 0;
box-shadow:10px 10px 0 var(--pokedex-dark);
position: relative;
}

.header{
background:var(--pokedex-red);
color:white;
margin:-20px -20px 20px -20px;
padding:15px;
text-align:center;
font-family:"Press Start 2P";
font-size:14px;
}

.info-box{
background:white;
border-radius:10px;
padding:15px;
margin-bottom:20px;
border-left:8px solid var(--pokedex-red);
}

.description-box {
background: #eee;
border-radius: 5px;
padding: 10px;
font-style: italic;
font-size: 0.9em;
color: #444;
min-height: 60px;
border: 1px dashed #ccc;
margin-top: 5px;
line-height: 1.4;
}

.animal-row{
padding:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
display: flex;
justify-content: space-between;
align-items: center;
}

.animal-row:hover { background: #f0f0f0; }

.type-badge{
display:inline-block;
padding:5px 10px;
color:white;
border-radius:5px;
font-size:11px;
margin-right:5px;
text-transform: uppercase;
font-weight: bold;
}

.rarity-dot {
display: inline-block;
width: 12px;
height: 12px;
border-radius: 50%;
margin-right: 5px;
vertical-align: middle;
border: 1px solid rgba(0,0,0,0.1);
}

.type-btn, .rarity-btn{
border:none;
padding:6px 10px;
margin:3px;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
font-size: 10px;
}

.img-container{
width:80%;
height:200px;
margin:auto;
background:#333;
display:flex;
align-items:center;
justify-content:center;
border-radius:10px;
border:8px solid #777;
font-family: "Press Start 2P";
color: #555;
overflow: hidden;
}
.img-hidden { display: none; }
.img-revealed { animation: popIn 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
@keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
}

label{
display:flex;
align-items:center;
margin:8px 0;
font-weight:bold;
cursor: pointer;
}

input[type="checkbox"]{
width:20px;
height:20px;
margin-right:10px;
}

</style>
</head>

<body>

<div class="page">
    <div class="header">Trainer Card</div>
    <div class="info-box">
        Trainer: <input id="trainerName" placeholder="Enter name...">
    </div>
    <div class="info-box">
        Seen: <span id="seenCount">0</span><br>
        Caught: <span id="caughtCount">0</span><br>
        Total: <span id="totalCount">0</span>
    </div>
</div>

<div class="page">
    <div class="header">Pokédex Index</div>
    <div class="info-box">
        <input id="searchInput" placeholder="Zoek op naam, type of zeldzaamheid..." style="width:100%;padding:10px;box-sizing: border-box;margin-bottom:10px;">
        <div id="rarityButtons"></div>
        <hr>
        <div id="typeButtons"></div>
    </div>
    <div class="info-box" style="max-height: 400px; overflow-y: auto;">
        <div id="animalList"></div>
    </div>
</div>

const rarityConfig = {
    "Common": "var(--common-gray)",
    "Rare": "var(--rare-blue)",
    "Legendary": "var(--legendary-gold)",
    "Mythical": "var(--mythical-purple)"
};

document.getElementById("totalCount").innerText=animals.length;

const list=document.getElementById("animalList");
const search=document.getElementById("searchInput");
const typeBox=document.getElementById("typeButtons");
const rarityBox=document.getElementById("rarityButtons");

let selectedType="";
let selectedRarity="";

const types=["Normal","Grass","Fire","Water","Ice","Flying","Dark","Ground","Poison","Steel","Fairy","Psychic","Rock","Ghost","Wood","Bloom","Berry"];

// Rarity knoppen
Object.keys(rarityConfig).forEach(r => {
    const b = document.createElement("button");
    b.className = "rarity-btn";
    b.innerHTML = `<span class="rarity-dot" style="background:${rarityConfig[r]}"></span> ${r}`;
    b.style.background = "#444"; 
    b.onclick = () => {
        selectedRarity = selectedRarity === r ? "" : r;
        render();
    };
    rarityBox.appendChild(b);
});

// Type knoppen
types.forEach(t=>{
    const b=document.createElement("button");
    b.className="type-btn";
    b.innerText=t;
    b.style.background=`var(--type-${t.toLowerCase()})`;
    b.onclick=()=>{
        selectedType = selectedType===t ? "" : t;
        render();
    };
    typeBox.appendChild(b);
});

function render(){
    list.innerHTML="";
    animals.forEach((a,i)=>{
        let name=a[0];
        let rarity=a[2];
        let types=a[3];
        let searchTerm = search.value.toLowerCase();

        if(searchTerm && !name.toLowerCase().includes(searchTerm) && !rarity.toLowerCase().includes(searchTerm)) return;
        if(selectedType && !types.includes(selectedType)) return;
        if(selectedRarity && rarity !== selectedRarity) return;

        let row=document.createElement("div");
        row.className="animal-row";
        row.innerHTML=`
            <span>#${String(i+1).padStart(3,"0")} ${name}</span>
            <span class="rarity-dot" style="background:${rarityConfig[rarity]}"></span>
        `;

        row.onclick=()=>{
            document.getElementById("animal"+i).scrollIntoView({behavior:"smooth"});
        };
        list.appendChild(row);
    });
}

search.addEventListener("input",render);

function updateCounters() {
    const seenCount = document.querySelectorAll('input.seen:checked').length;
    const caughtCount = document.querySelectorAll('input.caught:checked').length;
    document.getElementById("seenCount").innerText = seenCount;
    document.getElementById("caughtCount").innerText = caughtCount;
}

// Pagina's genereren
function generatePages() {
    animals.forEach((a,i)=>{
        let page=document.createElement("div");
        page.className="page";
        page.id="animal"+i;

        let rarity = a[2];
        let badges=a[3].map(t=>`<span class="type-badge" style="background:var(--type-${t.toLowerCase()})">${t}</span>`).join("");

        page.innerHTML=`
            <div class="header">${a[0]}</div>
            <div class="img-container" id="imgbox_${i}"><span id="placeholder_${i}" style="font-family:'Press Start 2P';color:#555;">???</span></div>
            <div class="info-box" id="info_rarity_${i}" style="display:none">
                <span class="rarity-dot" style="background:${rarityConfig[rarity]}"></span> <strong>${rarity}</strong><br>
                🇸🇪 ${a[1]} <br><br>
                ${badges}
            </div>
            <div class="info-box" id="info_desc_${i}" style="display:none">

                <div class="description-box">
                    ${a[4]}

        document.body.appendChild(page);
    });
}

// ===== INDEXEDDB =====
let db;
function openDB() {
    return new Promise((resolve, reject) => {
        const req = indexedDB.open('PokedexDB', 1);
        req.onupgradeneeded = e => {
            e.target.result.createObjectStore('images', { keyPath: 'entryIndex' });
        };
        req.onsuccess = e => { db = e.target.result; resolve(db); };
        req.onerror = e => reject(e.target.error);
    });
}

function dbSaveImage(entryIndex, dataUrl) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('images', 'readwrite');
        tx.objectStore('images').put({ entryIndex, dataUrl, uploadedAt: Date.now() });
        tx.oncomplete = resolve;
        tx.onerror = e => reject(e.target.error);
    });
}

function dbLoadAllImages() {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('images', 'readonly');
        const req = tx.objectStore('images').getAll();
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
    });
}

function dbLoadImage(entryIndex) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('images', 'readonly');
        const req = tx.objectStore('images').get(entryIndex);
        req.onsuccess = e => resolve(e.target.result);
        req.onerror = e => reject(e.target.error);
    });
}

function dbDeleteImage(entryIndex) {
    return new Promise((resolve, reject) => {
        const tx = db.transaction('images', 'readwrite');
        tx.objectStore('images').delete(entryIndex);
        tx.oncomplete = resolve;
        tx.onerror = e => reject(e.target.error);
    });
}

function applyImageToPage(entryIndex, dataUrl) {
    const box = document.getElementById('imgbox_' + entryIndex);
    if (box) {
        const seen = document.getElementById('seen_' + entryIndex)?.checked;
        const caught = document.getElementById('caught_' + entryIndex)?.checked;
        const revealed = seen || caught;
        box.innerHTML = '<span id="placeholder_' + entryIndex + '" style="font-family:\'Press Start 2P\';color:#555;"' + (revealed ? ' class="img-hidden"' : '') + '>???</span>'
            + '<img src="' + dataUrl + '" class="' + (revealed ? 'img-revealed' : 'img-hidden') + '" style="max-width:100%;max-height:100%;object-fit:contain;">';
    }
}

function clearImageOnPage(entryIndex) {
    const box = document.getElementById('imgbox_' + entryIndex);
    if (box) {
        box.innerHTML = '<span id="placeholder_' + entryIndex + '" style="font-family:\'Press Start 2P\';color:#555;">???</span>';
    }
}

function resizeImage(file) {
    return new Promise(resolve => {
        const canvas = document.createElement('canvas');
        const img = new Image();
        const url = URL.createObjectURL(file);
        img.onload = () => {
            let w = img.width, h = img.height;
            const maxW = 800, maxH = 600;
            if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
            if (h > maxH) { w = Math.round(w * maxH / h); h = maxH; }
            canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            URL.revokeObjectURL(url);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
        };
        img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
        img.src = url;
    });
}

// ===== LOCALSTORAGE PERSISTENCE =====
const TTL_MS = 14 * 24 * 60 * 60 * 1000;

function saveData() {
    try {
        const entries = {};
        animals.forEach((_, i) => {
            const s = document.getElementById('seen_' + i);
            const c = document.getElementById('caught_' + i);
            if (s && c && (s.checked || c.checked)) {
                entries[i] = { seen: s.checked, caught: c.checked };
            }
        });
        const data = {
            version: 1,
            trainerName: document.getElementById('trainerName').value,
            savedAt: Date.now(),
            entries
        };
        localStorage.setItem('pokedex_data', JSON.stringify(data));
    } catch(e) { console.warn('Could not save data:', e); }
}

function loadState() {
    try {
        const raw = localStorage.getItem('pokedex_data');
        if (!raw) return;
        const data = JSON.parse(raw);
        if (Date.now() - data.savedAt > TTL_MS) {
            localStorage.removeItem('pokedex_data');
            return;
        }
        if (data.trainerName) {
            document.getElementById('trainerName').value = data.trainerName;
        }
        if (data.entries) {
            Object.keys(data.entries).forEach(i => {
                const entry = data.entries[i];
                const s = document.getElementById('seen_' + i);
                const c = document.getElementById('caught_' + i);
                if (s) s.checked = !!entry.seen;
                if (c) c.checked = !!entry.caught;
                updatePageVisibility(i);
            });
        }
        updateCounters();
    } catch(e) {
        console.warn('Could not load saved data:', e);
        localStorage.removeItem('pokedex_data');
    }
}

function updatePageVisibility(i) {
    const seen = document.getElementById('seen_' + i)?.checked;
    const caught = document.getElementById('caught_' + i)?.checked;
    const rarityBox = document.getElementById('info_rarity_' + i);
    const descBox = document.getElementById('info_desc_' + i);
    const placeholder = document.getElementById('placeholder_' + i);
    const imgEl = document.querySelector('#imgbox_' + i + ' img');

    // Info boxes: only show when caught
    if (rarityBox) rarityBox.style.display = caught ? '' : 'none';
    if (descBox) descBox.style.display = caught ? '' : 'none';

    // Image: reveal with animation when seen or caught
    if (seen || caught) {
        if (imgEl) {
            imgEl.classList.remove('img-hidden');
            if (!imgEl.classList.contains('img-revealed')) {
                imgEl.classList.add('img-revealed');
            }
        }
        if (placeholder) placeholder.classList.add('img-hidden');
    } else {
        if (imgEl) {
            imgEl.classList.add('img-hidden');
            imgEl.classList.remove('img-revealed');
        }
        if (placeholder) placeholder.classList.remove('img-hidden');
    }
}

function onCheckboxChange(i) {
    updatePageVisibility(i);
    updateCounters();
    saveData();
}

// ===== ADMIN PANEL =====
async function adminExport() {
    const status = document.getElementById('adminStatus');
    status.textContent = 'Bezig met exporteren...';
    try {
        const images = await dbLoadAllImages();
        const imgData = {};
        images.forEach(img => { imgData[img.entryIndex] = img.dataUrl; });

        const response = await fetch(location.href);
        if (!response.ok) throw new Error('Kon bestand niet lezen');
        let source = await response.text();

        const newImgLine = 'const embeddedImages = ' + JSON.stringify(imgData) + '; // EXPORT_MARKER - do not modify this line';
        source = source.replace(/const embeddedImages\s*=\s*\{[^;]*\};\s*\/\/ EXPORT_MARKER[^\n]*/, newImgLine);

        const blob = new Blob([source], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pokedex-zweden.html';
        a.click();
        URL.revokeObjectURL(url);

        const count = Object.keys(imgData).length;
        status.textContent = 'Klaar! ' + count + ' afbeelding(en) ingebakken in het bestand.';
    } catch(e) {
        status.textContent = 'Export mislukt: ' + e.message;
        console.error(e);
    }
}

function openAdmin() {
    populateAdminDropdown();
    document.getElementById('adminPanel').style.display = 'flex';
    adminSelectEntry(0);
}

function closeAdmin() {
    document.getElementById('adminPanel').style.display = 'none';
}

function populateAdminDropdown() {
    const sel = document.getElementById('adminEntrySelect');
    if (sel.options.length > 0) return;
    animals.forEach((a, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = '#' + String(i+1).padStart(3,'0') + ' ' + a[0] + ' / ' + a[1];
        sel.appendChild(opt);
    });
    sel.onchange = () => adminSelectEntry(parseInt(sel.value));
}

function adminSelectEntry(idx) {
    document.getElementById('adminEntrySelect').value = idx;
    const preview = document.getElementById('adminPreview');
    if (!db) { preview.innerHTML = '<span style="color:#888">Database niet beschikbaar</span>'; return; }
    dbLoadImage(idx).then(record => {
        if (record) {
            preview.innerHTML = '<img src="' + record.dataUrl + '" style="max-width:100%;max-height:100%;object-fit:contain;border-radius:6px;">';
        } else {
            preview.innerHTML = '<span style="color:#888;font-family:monospace">Geen afbeelding</span>';
        }
    }).catch(() => {
        preview.innerHTML = '<span style="color:#888;font-family:monospace">Geen afbeelding</span>';
    });
}

async function adminUpload() {
    const fileInput = document.getElementById('adminFileInput');
    const status = document.getElementById('adminStatus');
    const idx = parseInt(document.getElementById('adminEntrySelect').value);
    if (!fileInput.files.length) { status.textContent = 'Selecteer eerst een afbeelding.'; return; }
    const file = fileInput.files[0];
    if (file.size > 15 * 1024 * 1024) { status.textContent = 'Bestand is te groot (max 15 MB).'; return; }
    status.textContent = 'Bezig met verwerken...';
    try {
        const dataUrl = await resizeImage(file);
        if (!dataUrl) { status.textContent = 'Kon afbeelding niet verwerken.'; return; }
        await dbSaveImage(idx, dataUrl);
        applyImageToPage(idx, dataUrl);
        adminSelectEntry(idx);
        status.textContent = 'Afbeelding opgeslagen!';
        fileInput.value = '';
    } catch(e) {
        status.textContent = 'Fout bij opslaan: ' + e.message;
    }
}

async function adminDelete() {
    const idx = parseInt(document.getElementById('adminEntrySelect').value);
    const status = document.getElementById('adminStatus');
    try {
        await dbDeleteImage(idx);
        clearImageOnPage(idx);
        adminSelectEntry(idx);
        status.textContent = 'Afbeelding verwijderd.';
    } catch(e) {
        status.textContent = 'Fout bij verwijderen: ' + e.message;
    }
}

// ===== STARTUP =====
let adminClickCount = 0, adminClickTimer;
document.addEventListener('DOMContentLoaded', () => {
    const trainerHeader = document.querySelector('.page .header');
    if (trainerHeader) {
        // Triple-click (desktop)
        trainerHeader.addEventListener('click', () => {
            adminClickCount++;
            clearTimeout(adminClickTimer);
            adminClickTimer = setTimeout(() => { adminClickCount = 0; }, 500);
            if (adminClickCount >= 3) { adminClickCount = 0; openAdmin(); }
        });
        // Long press (mobile)
        let longPressTimer;
        trainerHeader.addEventListener('touchstart', () => {
            longPressTimer = setTimeout(() => openAdmin(), 800);
        }, { passive: true });
        trainerHeader.addEventListener('touchend', () => clearTimeout(longPressTimer), { passive: true });
        trainerHeader.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });
    }
});
document.addEventListener('keydown', e => {
    if (e.ctrlKey && e.shiftKey && e.key === 'A') { e.preventDefault(); openAdmin(); }
});
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
}
document.getElementById('trainerName').addEventListener('input', saveData);
window.addEventListener('beforeunload', saveData);

generatePages();
// Apply images baked in via admin export (visible immediately, no DB needed)
Object.entries(embeddedImages).forEach(([idx, dataUrl]) => applyImageToPage(parseInt(idx), dataUrl));
openDB()
    .then(() => dbLoadAllImages())
    .then(images => { images.forEach(img => applyImageToPage(img.entryIndex, img.dataUrl)); })
    .catch(e => console.warn('IndexedDB niet beschikbaar, afbeeldingen werken niet:', e))
    .finally(() => {
        loadState();
        render();
    });

</script>
